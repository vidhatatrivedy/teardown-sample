## Import script (example)

```bash
cd teardown-sample/03_WORK_BREAKDOWN
# Manual: gh issue create --title "..." --body-file tasks/EPIC-06/TASK-06-01-01_remove_standalone_enquiries_router.md --label "priority:critical"
```

Create labels in GitHub first: `epic-01` … `epic-06`, `priority:critical`, `priority:high`, `priority:medium`.
